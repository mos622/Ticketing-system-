<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>忘記密碼 － 售票系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a1a; --ink-muted: #555; --ink-light: #888;
      --gold: #c8973a; --gold-pale: #f5eedc; --cream: #faf8f4;
      --white: #ffffff; --red: #b93b2a; --border: #e0dbd0;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      background: var(--white); border-bottom: 1px solid var(--border);
      height: 64px; display: flex; align-items: center; padding: 0 2rem;
    }
    .logo {
      font-family: 'Noto Serif TC', serif; font-size: 1.1rem;
      font-weight: 700; text-decoration: none; color: var(--ink);
    }
    .logo span { color: var(--gold); }
    .main {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 3rem 1rem;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: 'Noto Serif TC', serif; font-size: 1.25rem; font-weight: 700;
      margin-bottom: 0.5rem; text-align: center;
    }
    .card-desc {
      font-size: 0.85rem; color: var(--ink-muted); text-align: center;
      margin-bottom: 2rem; line-height: 1.5;
    }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.65rem 1rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream); transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--gold); background: var(--white); }
    .btn {
      width: 100%; padding: 0.75rem;
      background: var(--gold); color: var(--ink);
      border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      transition: opacity 0.2s; margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--ink-muted); margin-top: 0.75rem; font-weight: 400;
      text-decoration: none; display: block; text-align: center;
    }
    .btn-outline:hover { border-color: var(--ink); color: var(--ink); opacity: 1; }
    .msg {
      padding: 0.75rem 1rem; border-radius: 8px;
      font-size: 0.82rem; margin-bottom: 1rem; display: none;
    }
    .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .msg.error { background: #fce4ec; color: #b93b2a; border: 1px solid #f8bbd0; }
    footer {
      text-align: center; padding: 1.5rem;
      font-size: 0.75rem; color: var(--ink-light);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">售票<span>系統</span></a>
</nav>

<div class="main">
  <div class="card">
    <div class="card-title">忘記密碼</div>
    <div class="card-desc">請輸入您的註冊電子信箱，我們將寄送重設密碼的連結給您。</div>

    <div class="msg" id="msg"></div>

    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="forgot-email" placeholder="請輸入電子信箱" />
    </div>

    <button class="btn" onclick="handleForgotPassword()">發送重設連結</button>
    <a href="login.html" class="btn btn-outline">返回登入</a>
  </div>
</div>

<footer>© 2026 售票系統. All rights reserved.</footer>

<script>
  // ═══════════════════════════════════════════
  // ★ PHP/MySQL 接口設定區
  // ═══════════════════════════════════════════
  const API = {
    forgot_password: 'api/forgot_password.php', // POST: email
  };
  // ═══════════════════════════════════════════

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = text ? 'block' : 'none';
  }

  async function handleForgotPassword() {
    const email = document.getElementById('forgot-email').value.trim();

    if (!email) { showMsg('請輸入電子信箱', 'error'); return; }

    // ── 目前：假寄信邏輯 ──
    showMsg('重設密碼連結已寄出，請至信箱收取！', 'success');
    document.getElementById('forgot-email').value = '';

    /* ── 串接 PHP 後改用這段 ──
    try {
      const res = await fetch(API.forgot_password, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('重設密碼連結已寄出，請至信箱收取！', 'success');
      } else {
        showMsg(data.message || '找不到此信箱或發送失敗', 'error');
      }
    } catch (e) {
      showMsg('連線失敗，請稍後再試', 'error');
    }
    */
  }
</script>

</body>
</html>
