<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登入／註冊 － 售票系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #1a1a1a; --ink-muted: #555; --ink-light: #888;
      --gold: #c8973a; --gold-pale: #f5eedc; --cream: #faf8f4;
      --white: #ffffff; --red: #b93b2a; --border: #e0dbd0;
    }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column;
    }
    nav {
      background: var(--white); border-bottom: 1px solid var(--border);
      height: 64px; display: flex; align-items: center; padding: 0 2rem;
    }
    .logo {
      font-family: 'Noto Serif TC', serif; font-size: 1.1rem;
      font-weight: 700; text-decoration: none; color: var(--ink);
    }
    .logo span { color: var(--gold); }
    .main {
      flex: 1; display: flex; align-items: center;
      justify-content: center; padding: 3rem 1rem;
    }
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    }
    .tabs {
      display: flex; border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1; padding: 0.75rem; text-align: center;
      cursor: pointer; font-size: 0.9rem; color: var(--ink-light);
      border-bottom: 2px solid transparent; transition: all 0.2s;
    }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); font-weight: 500; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 0.4rem; }
    input {
      width: 100%; padding: 0.65rem 1rem;
      border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; font-family: 'Noto Sans TC', sans-serif;
      background: var(--cream); transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: var(--gold); background: var(--white); }
    .btn {
      width: 100%; padding: 0.75rem;
      background: var(--gold); color: var(--ink);
      border: none; border-radius: 8px; font-size: 0.9rem;
      font-weight: 700; cursor: pointer; font-family: 'Noto Sans TC', sans-serif;
      transition: opacity 0.2s; margin-top: 0.5rem;
    }
    .btn:hover { opacity: 0.85; }
    .btn-outline {
      background: transparent; border: 1px solid var(--border);
      color: var(--ink-muted); margin-top: 0.75rem; font-weight: 400;
    }
    .btn-outline:hover { border-color: var(--ink); color: var(--ink); opacity: 1; }
    .forgot { text-align: right; margin-top: -0.75rem; margin-bottom: 1rem; }
    .forgot a { font-size: 0.78rem; color: var(--gold); text-decoration: none; }
    .forgot a:hover { text-decoration: underline; }
    .msg {
      padding: 0.75rem 1rem; border-radius: 8px;
      font-size: 0.82rem; margin-bottom: 1rem; display: none;
    }
    .msg.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
    .msg.error { background: #fce4ec; color: #b93b2a; border: 1px solid #f8bbd0; }
    .divider {
      text-align: center; font-size: 0.75rem; color: var(--ink-light);
      margin: 1rem 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%;
      width: 42%; height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after { right: 0; }
    .panel { display: none; }
    .panel.active { display: block; }
    footer {
      text-align: center; padding: 1.5rem;
      font-size: 0.75rem; color: var(--ink-light);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">售票<span>系統</span></a>
</nav>

<div class="main">
  <div class="card">

    <!-- 分頁標籤 -->
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">登入</div>
      <div class="tab" onclick="switchTab('register')">註冊</div>
    </div>

    <!-- 訊息提示 -->
    <div class="msg" id="msg"></div>

    <!-- ── 登入面板 ── -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label>電子信箱</label>
        <input type="email" id="login-email" placeholder="請輸入電子信箱" />
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="login-password" placeholder="請輸入密碼" />
      </div>
      <div class="forgot">
        <a href="forgot_password.html">忘記密碼？</a>
      </div>
      <button class="btn" onclick="handleLogin()">登入</button>
      <div class="divider">或</div>
      <button class="btn btn-outline" onclick="switchTab('register')">還沒有帳號？立即註冊</button>
    </div>

    <!-- ── 註冊面板 ── -->
    <div class="panel" id="panel-register">
      <div class="form-group">
        <label>姓名</label>
        <input type="text" id="reg-name" placeholder="請輸入真實姓名" />
      </div>
      <div class="form-group">
        <label>電子信箱</label>
        <input type="email" id="reg-email" placeholder="請輸入電子信箱" />
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="reg-password" placeholder="至少 8 個字元" />
      </div>
      <div class="form-group">
        <label>確認密碼</label>
        <input type="password" id="reg-password2" placeholder="再輸入一次密碼" />
      </div>
      <button class="btn" onclick="handleRegister()">註冊</button>
      <div class="divider">或</div>
      <button class="btn btn-outline" onclick="switchTab('login')">已有帳號？返回登入</button>
    </div>

  </div>
</div>

<footer>© 2026 售票系統. All rights reserved.</footer>

<script>
  // ═══════════════════════════════════════════
  // ★ PHP/MySQL 接口設定區（之後串接時修改這裡）
  // ═══════════════════════════════════════════
  const API = {
    login:    'api/login.php',       // POST: email, password
    register: 'api/register.php',    // POST: name, email, password
  };
  // ═══════════════════════════════════════════

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0) === (tab === 'login'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
    showMsg('', '');
  }

  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + type;
    el.style.display = text ? 'block' : 'none';
  }

  // ── 登入 ──
      /* ── 串接 PHP 後改用這段 ──
    try {
      const res  = await fetch(API.login, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (data.success) {
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'profile.html';
      } else {
        showMsg(data.message || '帳號或密碼錯誤', 'error');
      }
    } catch (e) {
      showMsg('連線失敗，請稍後再試', 'error');
    }
    */
  
  async function handleLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;

    if (!email || !password) { showMsg('請填寫所有欄位', 'error'); return; }

    // ── 模擬前端帳密驗證 ──
    if (email === 'admin@example.com' && password === '12345678') {
      showMsg('登入成功！歡迎回來', 'success');
      
      // 在瀏覽器記憶體儲存登入狀態
      localStorage.setItem('isLoggedIn', 'true');
      localStorage.setItem('userName', '王小明');
      
      // 1.2 秒後跳轉回首頁，這時首頁就會看到大頭貼了！
      setTimeout(() => { window.location.href = 'index.html'; }, 1200);
    } else {
      showMsg('帳號或密碼錯誤（提示：admin@example.com / 12345678）', 'error');
    }
  }

  // ── 註冊 ──
  async function handleRegister() {
    const name      = document.getElementById('reg-name').value.trim();
    const email     = document.getElementById('reg-email').value.trim();
    const password  = document.getElementById('reg-password').value;
    const password2 = document.getElementById('reg-password2').value;

    if (!name || !email || !password || !password2) { showMsg('請填寫所有欄位', 'error'); return; }
    if (password.length < 8) { showMsg('密碼至少需要 8 個字元', 'error'); return; }
    if (password !== password2) { showMsg('兩次密碼輸入不一致', 'error'); return; }

    // ── 目前：假註冊邏輯 ──
    showMsg('註冊成功！請登入', 'success');
    setTimeout(() => { switchTab('login'); }, 1500);

    /* ── 串接 PHP 後改用這段 ──
    try {
      const res  = await fetch(API.register, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (data.success) {
        showMsg('註冊成功！請登入', 'success');
        setTimeout(() => { switchTab('login'); }, 1500);
      } else {
        showMsg(data.message || '註冊失敗', 'error');
      }
    } catch (e) {
      showMsg('連線失敗，請稍後再試', 'error');
    }
    */
  }
</script>

</body>
</html>
